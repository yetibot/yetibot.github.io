name: Build and Deploy

on:
  push:
    branches:
      - source
  pull_request:
    branches:
      - source

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Leiningen
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          lein: 'latest'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Sass
        run: npm install -g sass

      - name: Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('project.clj') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build site
        run: lein run

      - name: Copy CNAME
        run: cp CNAME resources/public/CNAME

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/source'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: master
          folder: resources/public

      - name: Purge Cloudflare Cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/source'
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_ZONE" ]; then
            curl -X DELETE "https://api.cloudflare.com/client/v4/zones/$CLOUDFLARE_ZONE/purge_cache" \
              -H "X-Auth-Email: $CLOUDFLARE_EMAIL" \
              -H "X-Auth-Key: $CLOUDFLARE_TOKEN" \
              -H "Content-Type: application/json" \
              --data '{"purge_everything":true}'
          else
            echo "Cloudflare zone not set, skipping cache purge"
          fi
